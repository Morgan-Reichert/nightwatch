<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0524"/>
      <stop offset="50%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="beerBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="beerShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="foam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowFire" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square (app icon shape) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <circle cx="100" cy="100" r="1.5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="200" cy="80"  r="1.5" fill="#7c3aed" opacity="0.2"/>
  <circle cx="312" cy="90"  r="1.5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="420" cy="110" r="1.5" fill="#7c3aed" opacity="0.2"/>
  <circle cx="80"  cy="420" r="1.5" fill="#7c3aed" opacity="0.2"/>
  <circle cx="430" cy="400" r="1.5" fill="#7c3aed" opacity="0.2"/>

  <!-- === FLAME (behind mug top) === -->
  <g filter="url(#glowFire)">
    <!-- Outer flame -->
    <path d="M256 108
             C256 108 224 148 220 178
             C218 194 224 206 224 206
             C224 206 230 188 238 178
             C238 178 228 210 236 228
             C240 238 248 244 248 244
             C248 244 236 244 228 234
             C216 220 214 204 214 204
             C214 204 220 168 256 108Z"
      fill="url(#flame)" opacity="0.95"/>
    <path d="M256 108
             C256 108 288 148 292 178
             C294 194 288 206 288 206
             C288 206 282 188 274 178
             C274 178 284 210 276 228
             C272 238 264 244 264 244
             C264 244 276 244 284 234
             C296 220 298 204 298 204
             C298 204 292 168 256 108Z"
      fill="url(#flame)" opacity="0.95"/>
    <path d="M256 108 C256 108 236 145 236 168 C236 184 244 196 256 204 C268 196 276 184 276 168 C276 145 256 108 256 108Z"
      fill="url(#flame)"/>
    <!-- Inner bright flame -->
    <path d="M256 140 C256 140 244 164 244 178 C244 188 250 196 256 200 C262 196 268 188 268 178 C268 164 256 140 256 140Z"
      fill="url(#flameInner)" opacity="0.8"/>
  </g>

  <!-- === BEER MUG === -->
  <g filter="url(#glow)">
    <!-- Mug body -->
    <rect x="170" y="248" width="172" height="164" rx="16" fill="url(#beerBody)"/>
    <!-- Mug shine -->
    <rect x="170" y="248" width="60" height="164" rx="16" fill="url(#beerShine)"/>
    <!-- Mug handle -->
    <path d="M342 270 C342 270 386 270 386 302 C386 334 342 338 342 338"
      stroke="url(#beerBody)" stroke-width="28" stroke-linecap="round" fill="none"/>
    <path d="M342 278 C342 278 372 278 372 302 C372 326 342 330 342 330"
      stroke="#f59e0b" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.4"/>
    <!-- Foam -->
    <ellipse cx="256" cy="248" rx="86" ry="22" fill="url(#foam)"/>
    <!-- Foam bubbles -->
    <ellipse cx="210" cy="244" rx="22" ry="16" fill="white" opacity="0.9"/>
    <ellipse cx="256" cy="240" rx="26" ry="18" fill="white"/>
    <ellipse cx="302" cy="244" rx="22" ry="16" fill="white" opacity="0.9"/>
    <ellipse cx="232" cy="242" rx="16" ry="12" fill="white" opacity="0.7"/>
    <ellipse cx="280" cy="242" rx="16" ry="12" fill="white" opacity="0.7"/>
    <!-- Beer bubbles inside -->
    <circle cx="210" cy="360" r="5" fill="#fde68a" opacity="0.25"/>
    <circle cx="240" cy="320" r="4" fill="#fde68a" opacity="0.2"/>
    <circle cx="270" cy="380" r="3" fill="#fde68a" opacity="0.2"/>
    <circle cx="300" cy="340" r="5" fill="#fde68a" opacity="0.25"/>
    <!-- Mug outline -->
    <rect x="170" y="248" width="172" height="164" rx="16" fill="none" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.4"/>
  </g>
</svg>
